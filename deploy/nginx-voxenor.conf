# /etc/nginx/sites-available/voxenor
# Voxenor reverse-proxy — copy to server and symlink:
#   sudo cp deploy/nginx-voxenor.conf /etc/nginx/sites-available/voxenor
#   sudo ln -sf /etc/nginx/sites-available/voxenor /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name voxenor.com www.voxenor.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name voxenor.com www.voxenor.com;

    # SSL certs — adjust paths to match your Let's Encrypt setup
    ssl_certificate     /etc/letsencrypt/live/voxenor.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voxenor.com/privkey.pem;

    # Upload limit — matches multer's 250 MB fileSize limit
    client_max_body_size 260m;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Timeouts — large EPUB uploads + Python extraction can take minutes
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}
