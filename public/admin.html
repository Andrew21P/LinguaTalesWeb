<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voxenor Admin — Analytics</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f1612; color: #e4e8e6; min-height: 100vh; padding: 1.5rem; }
    h1 { font-size: 1.6rem; margin-bottom: 1.2rem; color: #c8a96e; }
    h2 { font-size: 1.1rem; margin-bottom: .6rem; color: #9cb5a4; border-bottom: 1px solid #2a3a30; padding-bottom: .3rem; }
    a { color: #c8a96e; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .card { background: #1a2620; border-radius: 10px; padding: 1rem 1.2rem; }
    .card .big { font-size: 2rem; font-weight: 700; color: #c8a96e; }
    .card .label { font-size: .8rem; color: #7a9583; text-transform: uppercase; letter-spacing: .05em; margin-top: .2rem; }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    th, td { padding: .45rem .6rem; text-align: left; border-bottom: 1px solid #233028; }
    th { color: #7a9583; font-weight: 600; font-size: .75rem; text-transform: uppercase; }
    td { color: #c8d0cb; }
    .section { margin-bottom: 2rem; }
    .bar { display: flex; align-items: flex-end; gap: 3px; height: 80px; }
    .bar-col { background: #c8a96e; border-radius: 3px 3px 0 0; min-width: 18px; position: relative; }
    .bar-col .tip { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: .65rem; color: #7a9583; white-space: nowrap; }
    .bar-col .day { position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%); font-size: .6rem; color: #5a7562; white-space: nowrap; }
    .pill { display: inline-block; background: #233028; border-radius: 4px; padding: .15rem .45rem; font-size: .75rem; color: #9cb5a4; margin: .15rem .15rem; }
    .events-table td:first-child { white-space: nowrap; }
    .loading { text-align: center; padding: 3rem; color: #7a9583; }
    .back-link { display: inline-block; margin-bottom: 1rem; font-size: .85rem; }
    .refresh-btn { background: #233028; color: #c8a96e; border: 1px solid #3a5040; border-radius: 6px; padding: .35rem .8rem; cursor: pointer; font-size: .8rem; margin-left: .8rem; }
    .refresh-btn:hover { background: #2a3a30; }
  </style>
</head>
<body>
  <a href="/" class="back-link">&larr; Back to Voxenor</a>
  <h1>Analytics Dashboard <button class="refresh-btn" id="refresh">Refresh</button></h1>
  <div id="content"><div class="loading">Loading analytics...</div></div>

  <script src="/admin.js"></script>
</body>
</html>
