<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voxenor Admin — Analytics</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f1612; color: #e4e8e6; min-height: 100vh; padding: 1.5rem; }
    h1 { font-size: 1.6rem; margin-bottom: 1.2rem; color: #c8a96e; }
    h2 { font-size: 1.1rem; margin-bottom: .6rem; color: #9cb5a4; border-bottom: 1px solid #2a3a30; padding-bottom: .3rem; }
    a { color: #c8a96e; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .card { background: #1a2620; border-radius: 10px; padding: 1rem 1.2rem; }
    .card .big { font-size: 2rem; font-weight: 700; color: #c8a96e; }
    .card .label { font-size: .8rem; color: #7a9583; text-transform: uppercase; letter-spacing: .05em; margin-top: .2rem; }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    th, td { padding: .45rem .6rem; text-align: left; border-bottom: 1px solid #233028; }
    th { color: #7a9583; font-weight: 600; font-size: .75rem; text-transform: uppercase; }
    td { color: #c8d0cb; }
    .section { margin-bottom: 2rem; }
    .bar { display: flex; align-items: flex-end; gap: 3px; height: 80px; }
    .bar-col { background: #c8a96e; border-radius: 3px 3px 0 0; min-width: 18px; position: relative; }
    .bar-col .tip { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: .65rem; color: #7a9583; white-space: nowrap; }
    .bar-col .day { position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%); font-size: .6rem; color: #5a7562; white-space: nowrap; }
    .pill { display: inline-block; background: #233028; border-radius: 4px; padding: .15rem .45rem; font-size: .75rem; color: #9cb5a4; margin: .15rem .15rem; }
    .events-table td:first-child { white-space: nowrap; }
    .loading { text-align: center; padding: 3rem; color: #7a9583; }
    .back-link { display: inline-block; margin-bottom: 1rem; font-size: .85rem; }
    .refresh-btn { background: #233028; color: #c8a96e; border: 1px solid #3a5040; border-radius: 6px; padding: .35rem .8rem; cursor: pointer; font-size: .8rem; margin-left: .8rem; }
    .refresh-btn:hover { background: #2a3a30; }
  </style>
</head>
<body>
  <a href="/" class="back-link">&larr; Back to Voxenor</a>
  <h1>Analytics Dashboard <button class="refresh-btn" id="refresh">Refresh</button></h1>
  <div id="content"><div class="loading">Loading analytics...</div></div>

  <script>
    async function load() {
      const content = document.getElementById("content");
      try {
        const res = await fetch("/api/admin/analytics", { credentials: "same-origin" });
        if (!res.ok) {
          content.innerHTML = `<div class="loading">Access denied or not logged in. <a href="/">Go to Voxenor</a></div>`;
          return;
        }
        const d = await res.json();
        render(d);
      } catch (e) {
        content.innerHTML = `<div class="loading">Error: ${e.message}</div>`;
      }
    }

    function render(d) {
      const content = document.getElementById("content");
      const maxEvt = Math.max(...(d.last7days || []).map(r => r.count), 1);

      content.innerHTML = `
        <div class="grid">
          <div class="card"><div class="big">${d.totalUsers}</div><div class="label">Total Users</div></div>
          <div class="card"><div class="big">${d.premiumUsers}</div><div class="label">Premium Users</div></div>
          <div class="card"><div class="big">${d.totalBooks}</div><div class="label">Books Imported</div></div>
          <div class="card"><div class="big">${d.totalEvents}</div><div class="label">Total Events</div></div>
        </div>

        <div class="section">
          <h2>Events — Last 7 Days</h2>
          <div class="bar" style="margin-top:.5rem; margin-bottom:1.5rem; padding-bottom:1.2rem;">
            ${(d.last7days || []).map(r => `
              <div class="bar-col" style="height:${Math.max(4, (r.count / maxEvt) * 80)}px; flex:1;">
                <span class="tip">${r.count}</span>
                <span class="day">${r.day.slice(5)}</span>
              </div>
            `).join("")}
            ${(d.last7days || []).length === 0 ? '<span style="color:#5a7562;font-size:.85rem;">No data yet</span>' : ''}
          </div>
        </div>

        <div class="grid">
          <div class="section card">
            <h2>Event Breakdown</h2>
            <table>
              <tr><th>Event</th><th>Count</th></tr>
              ${(d.eventCounts || []).map(r => `<tr><td>${esc(r.event)}</td><td>${r.count}</td></tr>`).join("")}
            </table>
          </div>

          <div class="section card">
            <h2>Top Countries</h2>
            ${(d.topCountries || []).length ? (d.topCountries || []).map(r => `<span class="pill">${esc(r.country || "Unknown")} (${r.users})</span>`).join("") : '<span style="color:#5a7562;font-size:.85rem;">No data yet — country detection requires a GeoIP lookup.</span>'}
          </div>

          <div class="section card">
            <h2>Operating Systems</h2>
            <table>
              <tr><th>OS</th><th>Users</th></tr>
              ${(d.topOS || []).map(r => `<tr><td>${esc(r.os)}</td><td>${r.users}</td></tr>`).join("")}
            </table>
          </div>

          <div class="section card">
            <h2>Browsers</h2>
            <table>
              <tr><th>Browser</th><th>Users</th></tr>
              ${(d.topBrowsers || []).map(r => `<tr><td>${esc(r.browser)}</td><td>${r.users}</td></tr>`).join("")}
            </table>
          </div>

          <div class="section card">
            <h2>Languages</h2>
            ${(d.topLanguages || []).map(r => `<span class="pill">${esc(r.language)} (${r.users})</span>`).join("")}
          </div>

          <div class="section card">
            <h2>Signups — Last 30 Days</h2>
            <table>
              <tr><th>Date</th><th>New Users</th></tr>
              ${(d.recentSignups || []).map(r => `<tr><td>${r.day}</td><td>${r.count}</td></tr>`).join("")}
            </table>
          </div>
        </div>

        <div class="section">
          <h2>Recent Events (Last 50)</h2>
          <div style="overflow-x:auto;">
            <table class="events-table">
              <tr><th>Time</th><th>Event</th><th>User</th><th>OS</th><th>Browser</th><th>Lang</th><th>Details</th></tr>
              ${(d.recentEvents || []).map(r => {
                let details = "";
                try { const p = JSON.parse(r.payload || "{}"); details = Object.entries(p).map(([k,v]) => `${k}: ${v}`).join(", "); } catch {}
                return `<tr>
                  <td>${r.created_at}</td>
                  <td><span class="pill">${esc(r.event)}</span></td>
                  <td>${esc(r.email || r.name || "—")}</td>
                  <td>${esc(r.os || "—")}</td>
                  <td>${esc(r.browser || "—")}</td>
                  <td>${esc(r.language || "—")}</td>
                  <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(details || "—")}</td>
                </tr>`;
              }).join("")}
            </table>
          </div>
        </div>
      `;
    }

    function esc(s) {
      const el = document.createElement("span");
      el.textContent = String(s);
      return el.innerHTML;
    }

    document.getElementById("refresh").addEventListener("click", load);
    load();
  </script>
</body>
</html>
