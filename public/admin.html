<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voxenor Admin — Analytics</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f1612; color: #e4e8e6; min-height: 100vh; padding: 1.5rem; }
    h1 { font-size: 1.6rem; margin-bottom: 1.2rem; color: #c8a96e; }
    h2 { font-size: 1.1rem; margin-bottom: .6rem; color: #9cb5a4; border-bottom: 1px solid #2a3a30; padding-bottom: .3rem; }
    h3 { font-size: .95rem; color: #9cb5a4; margin-bottom: .4rem; }
    a { color: #c8a96e; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .grid-wide { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
    .card { background: #1a2620; border-radius: 10px; padding: 1rem 1.2rem; }
    .card .big { font-size: 2rem; font-weight: 700; color: #c8a96e; }
    .card .label { font-size: .8rem; color: #7a9583; text-transform: uppercase; letter-spacing: .05em; margin-top: .2rem; }
    table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    th, td { padding: .4rem .55rem; text-align: left; border-bottom: 1px solid #233028; }
    th { color: #7a9583; font-weight: 600; font-size: .72rem; text-transform: uppercase; position: sticky; top: 0; background: #1a2620; }
    td { color: #c8d0cb; }
    tr:hover td { background: #1e2e26; }
    .section { margin-bottom: 2rem; }
    .bar { display: flex; align-items: flex-end; gap: 3px; height: 80px; }
    .bar-col { background: #c8a96e; border-radius: 3px 3px 0 0; min-width: 18px; position: relative; }
    .bar-col .tip { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: .65rem; color: #7a9583; white-space: nowrap; }
    .bar-col .day { position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%); font-size: .6rem; color: #5a7562; white-space: nowrap; }
    .pill { display: inline-block; background: #233028; border-radius: 4px; padding: .15rem .45rem; font-size: .72rem; color: #9cb5a4; margin: .15rem .15rem; }
    .pill-gutenberg { background: #1e3828; color: #7ec87e; }
    .pill-upload { background: #38301e; color: #c8a96e; }
    .pill-paste { background: #1e2838; color: #7ea8c8; }
    .pill-premium { background: #382e1e; color: #e8c060; }
    .pill-free { background: #233028; color: #7a9583; }
    .events-table td:first-child { white-space: nowrap; }
    .loading { text-align: center; padding: 3rem; color: #7a9583; }
    .back-link { display: inline-block; margin-bottom: 1rem; font-size: .85rem; }
    .refresh-btn { background: #233028; color: #c8a96e; border: 1px solid #3a5040; border-radius: 6px; padding: .35rem .8rem; cursor: pointer; font-size: .8rem; margin-left: .8rem; }
    .refresh-btn:hover { background: #2a3a30; }
    .scroll-table { max-height: 500px; overflow-y: auto; overflow-x: auto; border-radius: 8px; }
    .muted { color: #5a7562; font-size: .78rem; }
    .user-books-row { display: none; }
    .user-books-row.open { display: table-row; }
    .user-books-row td { padding: .4rem 1.2rem; background: #14201a; }
    .toggle-books { cursor: pointer; color: #c8a96e; text-decoration: underline; font-size: .78rem; }
    .mini-table { width: 100%; font-size: .78rem; }
    .mini-table th { background: #14201a; font-size: .68rem; }
    .mini-table td { border-bottom: 1px solid #1a2620; }
    .tabs { display: flex; gap: .5rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .tab { background: #1a2620; color: #7a9583; border: 1px solid #2a3a30; border-radius: 6px; padding: .4rem .9rem; cursor: pointer; font-size: .82rem; }
    .tab.active { background: #2a3a30; color: #c8a96e; border-color: #c8a96e; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>
  <a href="/" class="back-link">&larr; Back to Voxenor</a>
  <h1>Analytics Dashboard <button class="refresh-btn" id="refresh">Refresh</button></h1>
  <div id="content"><div class="loading">Loading analytics...</div></div>

  <script src="/admin.js"></script>
</body>
</html>
